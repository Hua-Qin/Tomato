name: Android CI

on:
  push:
    branches:
      - 'main'
      - 'dev'
      - 'trae/**'

  pull_request:
    types: [ opened, synchronize, reopened ]

  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug APK with Gradle
        run: ./gradlew assembleFossDebug

      - name: Run tests
        run: ./gradlew testFossDebugUnitTest

      - name: Rename APK with build info
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          DATE=$(date +'%Y%m%d')
          BRANCH=$(echo "${{ github.ref_name }}" | tr '/' '-')
          mv ./androidApp/build/outputs/apk/foss/debug/androidApp-foss-debug.apk \
             ./androidApp/build/outputs/apk/foss/debug/Tomato-${BRANCH}-${DATE}-${SHORT_SHA}.apk

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v7
        with:
          name: Tomato-APK-${{ github.ref_name }}-${{ github.sha }}
          archive: false
          path: ./androidApp/build/outputs/apk/foss/debug/Tomato-*.apk
          retention-days: 30
